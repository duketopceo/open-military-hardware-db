# =============================================================================
# OMHDB — Docker Swarm Production Deployment
# =============================================================================
# Deploy:  docker stack deploy -c docker-compose.swarm.yml omhdb
# Remove:  docker stack rm omhdb
# Logs:    docker service logs omhdb_app -f
# Scale:   docker service scale omhdb_app=2
# =============================================================================

version: '3.9'

services:
  app:
    image: ghcr.io/duketopceo/omhdb:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile.prod
    ports:
      - "5100:5000"
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - omhdb-net

networks:
  omhdb-net:
    driver: overlay
