name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn pydantic httpx pytest pytest-cov

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short --cov=api --cov-report=term-missing

      - name: Check API starts
        run: |
          timeout 10 uvicorn api.main:app --host 0.0.0.0 --port 8000 &
          sleep 3
          curl -sf http://localhost:8000/health | python -m json.tool
          kill %1

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install linters
        run: pip install ruff

      - name: Lint with ruff
        run: ruff check api/ tests/ scripts/ --ignore E501

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t mildb-api:test .

      - name: Test Docker container
        run: |
          docker run -d --name mildb-test -p 8000:8000 mildb-api:test
          sleep 5
          curl -sf http://localhost:8000/health | python3 -m json.tool
          docker stop mildb-test
