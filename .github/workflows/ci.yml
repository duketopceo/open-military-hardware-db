name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-and-export:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate platforms.json against JSON Schema
        run: |
          python -c "
          import json
          from pathlib import Path
          import jsonschema
          root = Path('.')
          with open(root / 'data/json/platforms.json', encoding='utf-8') as f:
              data = json.load(f)
          assert isinstance(data, list), 'platforms.json must be a JSON array'
          with open(root / 'schemas/platform_schema.json', encoding='utf-8') as f:
              schema = json.load(f)
          for i, item in enumerate(data):
              jsonschema.validate(instance=item, schema=schema)
          print(f'OK: {len(data)} platforms validated')
          "

      - name: Run export pipeline
        run: python scripts/exporters/export_all.py

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short --cov=api --cov-report=term-missing

      - name: Check API starts
        run: |
          timeout 10 uvicorn api.main:app --host 0.0.0.0 --port 8000 &
          sleep 3
          curl -sf http://localhost:8000/health | python -m json.tool
          kill %1

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install root deps and build SQLite dataset
        run: |
          pip install -r requirements.txt
          python scripts/exporters/export_all.py

      - name: Install backend deps and run tests
        run: |
          pip install -r backend/requirements.txt
          cd backend && python -m pytest -q

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install linters
        run: pip install ruff

      - name: Lint with ruff
        run: ruff check api/ tests/ scripts/ --ignore E501

  docker:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -t mildb-api:test .

      - name: Test Docker container
        run: |
          docker run -d --name mildb-test -p 8000:8000 mildb-api:test
          sleep 5
          curl -sf http://localhost:8000/health | python3 -m json.tool
          docker stop mildb-test
